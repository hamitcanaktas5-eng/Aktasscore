<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AktaşScore — Giriş</title>
  <link rel="stylesheet" href="index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-grid"></div>

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" stroke="#00e676" stroke-width="2"/>
        <path d="M18 6 L21 14 L30 14 L23 19 L26 28 L18 23 L10 28 L13 19 L6 14 L15 14 Z" fill="#00e676" opacity="0.15" stroke="#00e676" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="18" cy="18" r="4" fill="#00e676"/>
      </svg>
    </div>
    <div class="logo-text"><span class="logo-main">Aktaş</span><span class="logo-accent">Score</span></div>
    <div class="logo-sub">CANLI SKOR TAKİP · v0.1</div>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" data-tab="login">Giriş Yap</button>
      <button class="tab" data-tab="register">Kayıt Ol</button>
    </div>

    <!-- LOGIN -->
    <form id="form-login" class="auth-form active" novalidate>
      <div class="field-group">
        <label>E-Posta</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2l-8 5-8-5h16zm0 12H4V9l8 5 8-5v9z"/></svg>
          <input type="email" id="login-email" placeholder="ornek@email.com" autocomplete="email"/>
        </div>
        <span class="field-error" id="login-email-err"></span>
      </div>
      <div class="field-group">
        <label>Şifre</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" id="login-password" placeholder="Şifreniz" autocomplete="current-password"/>
          <button type="button" class="eye-btn" data-target="login-password"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
        </div>
        <span class="field-error" id="login-password-err"></span>
      </div>
      <div class="forgot-link-wrap">
        <button type="button" class="forgot-link" data-tab="forgot">Şifremi Unuttum</button>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">
        <span class="btn-text">Giriş Yap</span>
        <span class="btn-loader hidden"></span>
      </button>
      <div class="demo-hint">Demo: <strong>demo@aktasscore.com</strong> / <strong>123456</strong></div>
      <div class="divider"><span>veya</span></div>
      <p class="switch-hint">Hesabın yok mu? <button type="button" class="link-btn" data-tab="register">Kayıt Ol</button></p>
    </form>

    <!-- REGISTER -->
    <form id="form-register" class="auth-form" novalidate>
      <div class="field-group">
        <label>E-Posta</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2l-8 5-8-5h16zm0 12H4V9l8 5 8-5v9z"/></svg>
          <input type="email" id="reg-email" placeholder="ornek@email.com" autocomplete="email"/>
        </div>
        <span class="field-error" id="reg-email-err"></span>
      </div>
      <div class="field-group">
        <label>Şifre</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" id="reg-password" placeholder="En az 6 karakter" autocomplete="new-password"/>
          <button type="button" class="eye-btn" data-target="reg-password"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
        </div>
        <span class="field-error" id="reg-password-err"></span>
        <div class="strength-bar-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>
      <div class="field-group">
        <label>Şifre Tekrar</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" id="reg-confirm" placeholder="Şifrenizi tekrar girin" autocomplete="new-password"/>
          <button type="button" class="eye-btn" data-target="reg-confirm"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
        </div>
        <span class="field-error" id="reg-confirm-err"></span>
      </div>
      <button type="submit" class="btn-primary" id="register-btn">
        <span class="btn-text">Hesap Oluştur</span>
        <span class="btn-loader hidden"></span>
      </button>
      <div class="divider"><span>veya</span></div>
      <p class="switch-hint">Zaten hesabın var mı? <button type="button" class="link-btn" data-tab="login">Giriş Yap</button></p>
    </form>

    <!-- FORGOT -->
    <form id="form-forgot" class="auth-form" novalidate>
      <div class="forgot-header">
        <button type="button" class="back-btn-sm" data-tab="login">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div>
          <h2 class="forgot-title">Şifremi Unuttum</h2>
          <p class="forgot-desc">E-posta adresine sıfırlama bağlantısı gönderilecek</p>
        </div>
      </div>
      <div class="field-group">
        <label>E-Posta</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2l-8 5-8-5h16zm0 12H4V9l8 5 8-5v9z"/></svg>
          <input type="email" id="forgot-email" placeholder="ornek@email.com" autocomplete="email"/>
        </div>
        <span class="field-error" id="forgot-email-err"></span>
      </div>
      <button type="submit" class="btn-primary" id="forgot-btn">
        <span class="btn-text">Sıfırlama Gönder</span>
        <span class="btn-loader hidden"></span>
      </button>
    </form>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="success-modal">
    <div class="modal">
      <div class="modal-icon success">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </div>
      <h3 id="modal-title">Başarılı!</h3>
      <p id="modal-desc">İşlem tamamlandı.</p>
      <button class="btn-primary" id="modal-ok">Tamam</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="index.js"></script>
</body>
</html>
